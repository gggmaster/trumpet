name: Refresh property indicator data

on:
  workflow_dispatch:
  schedule:
    # Monday 07:00 Australia/Sydney is Sunday 20:00 UTC during AEST.
    # Adjust manually during daylight saving if exact local timing matters.
    - cron: "0 20 * * 0"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build public data payload with official backfill
        working-directory: property_data_app
        run: npm install && npm run build:public-data

      - name: Commit refreshed data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          branch: main
          commit_message: "Refresh property indicator data"
          file_pattern: |
            property_data_app/public/property-leading-indicators-public.json
