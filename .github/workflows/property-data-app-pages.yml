name: Deploy property data app to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: property-data-app-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: property_data_app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: property_data_app/package.json

      - name: Install dependencies
        run: npm install

      - name: Build public data
        run: npm run build:public-data

      - name: Build app
        env:
          VITE_ENTRA_TENANT_ID: ${{ vars.VITE_ENTRA_TENANT_ID }}
          VITE_ENTRA_CLIENT_ID: ${{ vars.VITE_ENTRA_CLIENT_ID }}
          VITE_POWERBI_WORKSPACE_ID: ${{ vars.VITE_POWERBI_WORKSPACE_ID }}
          VITE_POWERBI_SEMANTIC_MODEL_ID: ${{ vars.VITE_POWERBI_SEMANTIC_MODEL_ID }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: property_data_app/dist

  deploy:
    if: ${{ vars.ENABLE_GITHUB_PAGES_DEPLOY == 'true' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
