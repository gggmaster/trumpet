name: Deploy property data app to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: property-data-app-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full app
        uses: actions/checkout@v4
        with:
          ref: main
          path: source-main

      - name: Checkout capital-city public app
        uses: actions/checkout@v4
        with:
          ref: codex/public-capital-cities
          path: source-public

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            source-main/property_data_app/package-lock.json
            source-public/property_data_app/package-lock.json

      - name: Install full app dependencies
        working-directory: source-main/property_data_app
        run: npm ci

      - name: Install capital-city app dependencies
        working-directory: source-public/property_data_app
        run: npm ci

      - name: Build full app
        working-directory: source-main/property_data_app
        env:
          VITE_ENTRA_TENANT_ID: ${{ vars.VITE_ENTRA_TENANT_ID }}
          VITE_ENTRA_CLIENT_ID: ${{ vars.VITE_ENTRA_CLIENT_ID }}
          VITE_POWERBI_WORKSPACE_ID: ${{ vars.VITE_POWERBI_WORKSPACE_ID }}
          VITE_POWERBI_SEMANTIC_MODEL_ID: ${{ vars.VITE_POWERBI_SEMANTIC_MODEL_ID }}
        run: npm run build

      - name: Build capital-city public app
        working-directory: source-public/property_data_app
        env:
          VITE_ENTRA_TENANT_ID: ""
          VITE_ENTRA_CLIENT_ID: ""
          VITE_POWERBI_WORKSPACE_ID: ""
          VITE_POWERBI_SEMANTIC_MODEL_ID: ""
        run: npm run build

      - name: Assemble Pages site
        run: |
          mkdir -p pages-site/capital-cities
          cp -a source-main/property_data_app/dist/. pages-site/
          cp -a source-public/property_data_app/dist/. pages-site/capital-cities/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-site

  deploy:
    if: ${{ vars.ENABLE_GITHUB_PAGES_DEPLOY == 'true' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
